name: AIBTC Agent Automation

on:
  schedule:
    # Runs every 15 minutes to ensure max activity
    - cron: '*/15 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Agent
        env:
          BTC_ADDRESS: ${{ secrets.BTC_ADDRESS }}
          MNEMONIC: ${{ secrets.MNEMONIC }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node agent.js
