name: AIBTC Agent Automation

on:
  schedule:
    # Runs every 3 hours to ensure heartbeats are sent, 
    # and handles news at your specific UTC times.
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Agent
        env:
          BTC_ADDRESS: ${{ secrets.BTC_ADDRESS }}
          STX_ADDRESS: ${{ secrets.STX_ADDRESS }}
          MNEMONIC: ${{ secrets.MNEMONIC }}
        run: python agent.py
